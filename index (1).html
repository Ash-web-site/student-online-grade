<!DOCTYPE html>
<html>
<head>
    <title>Student Grades Sheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #857C91;
            color: black;
            padding: 20px;
        }

        /* Centered Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: #CD9FA0;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 6px;
            margin: 5px;
            width: 120px;
        }

        button {
            padding: 6px 12px;
            margin: 5px;
            background: #F2C1A3;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: black;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
            margin-top: 20px;
        }

        th, td {
            padding: 8px;
            border: 1px solid #CD9FA0;
            text-align: center;
        }

        th {
            background: #525871;
            color: white;
        }
    </style>
</head>

<body>
    
<div class="header">
    <h2>Passi City College</h2>
    <h3>Bachelor of Science in Information Technology</h3>
    <h1>Student Grades Sheet</h1>
</div>

<div class="container">

    <!-- Hidden field for editing -->
    <input type="hidden" id="studentId">

    <!-- Input Fields -->
    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="it103" placeholder="IT 103">
    <input type="number" id="ms101" placeholder="MS 101">
    <input type="number" id="hci101" placeholder="HCI 101">
    <input type="number" id="ge7" placeholder="GE 7">
    <input type="number" id="ge9" placeholder="GE 9">

    <button onclick="saveStudent()">Save Student</button>

    <!-- Student Table -->
    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>IT 103</th>
                <th>MS 101</th>
                <th>HCI 101</th>
                <th>GE 7</th>
                <th>GE 9</th>
                <th>Average</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function saveToStorage() {
    localStorage.setItem("students", JSON.stringify(students));
}

function calculateAverage(s1, s2, s3, s4, s5) {
    return ((s1 + s2 + s3 + s4 + s5) / 5).toFixed(2);
}

function saveStudent() {
    const idField = document.getElementById("studentId").value;
    const name = document.getElementById("name").value.trim();
    const s1 = parseFloat(document.getElementById("it103").value);
    const s2 = parseFloat(document.getElementById("ms101").value);
    const s3 = parseFloat(document.getElementById("hci101").value);
    const s4 = parseFloat(document.getElementById("ge7").value);
    const s5 = parseFloat(document.getElementById("ge9").value);

    if (!name || isNaN(s1) || isNaN(s2) || isNaN(s3) || isNaN(s4) || isNaN(s5)) {
        alert("Please complete all fields.");
        return;
    }

    const average = calculateAverage(s1, s2, s3, s4, s5);

    if (idField) {
        const index = students.findIndex(s => s.id == idField);
        students[index] = { id: idField, name, s1, s2, s3, s4, s5, average };
    } else {
        const newStudent = {
            id: Date.now(),
            name,
            s1,
            s2,
            s3,
            s4,
            s5,
            average
        };
        students.push(newStudent);
    }

    saveToStorage();
    renderTable();
    clearFields();
}

function renderTable() {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    students.forEach(student => {
        tableBody.innerHTML += `
            <tr>
                <td>${student.name}</td>
                <td>${student.s1}</td>
                <td>${student.s2}</td>
                <td>${student.s3}</td>
                <td>${student.s4}</td>
                <td>${student.s5}</td>
                <td>${student.average}</td>
                <td>
                    <button onclick="editStudent(${student.id})">Edit</button>
                    <button onclick="deleteStudent(${student.id})">Delete</button>
                </td>
            </tr>
        `;
    });
}

function editStudent(id) {
    const student = students.find(s => s.id == id);
    document.getElementById("studentId").value = student.id;
    document.getElementById("name").value = student.name;
    document.getElementById("it103").value = student.s1;
    document.getElementById("ms101").value = student.s2;
    document.getElementById("hci101").value = student.s3;
    document.getElementById("ge7").value = student.s4;
    document.getElementById("ge9").value = student.s5;
}

function deleteStudent(id) {
    if (confirm("Are you sure you want to delete this student?")) {
        students = students.filter(student => student.id != id);
        saveToStorage();
        renderTable();
    }
}

function clearFields() {
    document.getElementById("studentId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("it103").value = "";
    document.getElementById("ms101").value = "";
    document.getElementById("hci101").value = "";
    document.getElementById("ge7").value = "";
    document.getElementById("ge9").value = "";
}

renderTable();
</script>

</body>
</html>
